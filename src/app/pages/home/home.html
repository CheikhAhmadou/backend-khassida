<div class="shell">

  <!-- Arabesque background pattern -->
  <div class="shell-bg-pattern"></div>

  <!-- TOP NAV -->
  <nav class="topnav">
    <div class="nav-brand">
      <!-- Logo étoile mouride -->
      <div class="nav-logo">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Étoile 5 branches Mouride -->
          <polygon points="16,2 19.5,11.5 29.5,11.5 21.5,17.5 24.5,27 16,21 7.5,27 10.5,17.5 2.5,11.5 12.5,11.5"
            fill="#1a1206" stroke="#1a1206" stroke-width="0.3"/>
          <polygon points="16,4 19,12.5 27.5,12.5 20.5,17.8 23.2,26 16,21.2 8.8,26 11.5,17.8 4.5,12.5 13,12.5"
            fill="#c8a030"/>
          <!-- Croissant central -->
          <path d="M16,10 A6,6 0 1,1 16,22 A4,4 0 1,0 16,10 Z" fill="#1a1206"/>
        </svg>
      </div>
      <div>
        <div class="nav-title">Khassida Projection</div>
        <div class="nav-sub">
          <span class="nav-ar">خَادِمُ الرَّسُولِ</span>
          &nbsp;·&nbsp; Diaporama grand écran
        </div>
      </div>
    </div>

    <!-- Calligraphie centrale -->
    <div class="nav-callig">
      <span class="nav-callig-text">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</span>
    </div>

    <div class="nav-actions">
      @if (newSlidesCount() > 0) {
        <span class="nav-sync-badge">+{{ newSlidesCount() }} nouvelle(s)</span>
      }
      <span class="nav-badge">{{ slides().length }} images</span>
      <a routerLink="/admin" class="nav-btn-admin">Admin</a>
    </div>
  </nav>

  <!-- LAYOUT -->
  <div class="layout">

    <!-- STAGE -->
    <main class="main">
      @if (loading()) {
        <div class="loading">
          <!-- Mosquée de Touba SVG -->
          <svg class="loading-mosque" width="160" height="120" viewBox="0 0 320 240" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Dôme central -->
            <ellipse cx="160" cy="80" rx="60" ry="52" fill="#c8a030" opacity="0.2"/>
            <ellipse cx="160" cy="80" rx="55" ry="47" fill="none" stroke="#c8a030" stroke-width="1" opacity="0.5"/>
            <rect x="100" y="80" width="120" height="50" fill="#c8a030" opacity="0.15"/>
            <rect x="100" y="80" width="120" height="50" fill="none" stroke="#c8a030" stroke-width="0.8" opacity="0.4"/>
            <!-- Dômes secondaires -->
            <ellipse cx="68" cy="108" rx="30" ry="24" fill="#c8a030" opacity="0.12"/>
            <ellipse cx="252" cy="108" rx="30" ry="24" fill="#c8a030" opacity="0.12"/>
            <rect x="38" y="108" width="60" height="22" fill="#c8a030" opacity="0.1"/>
            <rect x="222" y="108" width="60" height="22" fill="#c8a030" opacity="0.1"/>
            <!-- Façade -->
            <rect x="38" y="130" width="244" height="70" fill="#c8a030" opacity="0.08"/>
            <rect x="38" y="130" width="244" height="70" fill="none" stroke="#c8a030" stroke-width="0.8" opacity="0.35"/>
            <!-- Porte principale arche -->
            <path d="M140,200 L140,163 Q140,148 160,148 Q180,148 180,163 L180,200 Z" fill="#c8a030" opacity="0.2"/>
            <!-- Minaret central -->
            <rect x="152" y="28" width="16" height="52"/> <!-- base -->
            <rect x="154" y="8" width="12" height="20"/>
            <polygon points="160,0 154,8 166,8" fill="#c8a030" opacity="0.6"/>
            <rect x="150" y="28" width="20" height="5" fill="#c8a030" opacity="0.3"/>
            <!-- Minarets secondaires -->
            <rect x="92" y="90" width="10" height="40" fill="#c8a030" opacity="0.3"/>
            <polygon points="97,84 92,90 102,90" fill="#c8a030" opacity="0.5"/>
            <rect x="218" y="90" width="10" height="40" fill="#c8a030" opacity="0.3"/>
            <polygon points="223,84 218,90 228,90" fill="#c8a030" opacity="0.5"/>
            <!-- Croissant minaret central -->
            <path d="M157,1 A3,3 0 1,1 163,1 A2,2 0 1,0 157,1 Z" fill="#c8a030" opacity="0.8"/>
          </svg>
          <div class="loading-title">طُوبَى</div>
          <div class="loading-sub">Chargement des khassidas…</div>
          <!-- Étoiles décoratives -->
          <div class="loading-stars">
            <span>✦</span><span>✦</span><span>✦</span>
          </div>
        </div>
      } @else {
        <app-slideshow
          [slides]="slides()"
          [intervalMs]="5000"
          (indexChange)="onIndexChange($event)"
        />
      }
    </main>

    <!-- SIDEBAR droite -->
    <app-sidebar
      [collections]="collections()"
      [slides]="slides()"
      [currentIndex]="currentIndex()"
      [activeCollectionId]="activeCollectionId()"
      (collectionSelect)="onCollectionSelect($event)"
      (slideSelect)="onSlideSelect($event)"
    />

  </div>
</div>
