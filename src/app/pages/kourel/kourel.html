<div class="kourel-shell">

  <div class="kourel-bg-geo">
    <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <defs>
        <pattern id="geo2" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
          <polygon points="40,4 76,22 76,58 40,76 4,58 4,22" fill="none" stroke="#d0a13b" stroke-width="0.4" opacity="0.1"/>
          <circle cx="40" cy="40" r="6" fill="none" stroke="#d0a13b" stroke-width="0.3" opacity="0.07"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#geo2)"/>
    </svg>
  </div>

  <!-- NAV -->
  <nav class="kourel-nav">
    <div class="kourel-nav-brand">
      <a routerLink="/" class="kourel-nav-back">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="currentColor"><path d="M9 2L4 7l5 5V2z"/></svg>
        Accueil
      </a>
      <div class="kourel-nav-sep">✦</div>
      <div class="kourel-nav-title">Collections Kourel</div>
    </div>
    <div class="kourel-nav-callig">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
    <div class="kourel-nav-logo">
      <img src="logo-diawartoulah.gif" alt="Diawartoulah TV" class="kourel-logo-img"/>
      <span class="kourel-logo-name">Diawartoulah Paris</span>
    </div>
  </nav>

  <!-- HERO -->
  <div class="kourel-hero">
    <div class="kourel-hero-ornament">
      <div class="kourel-hero-line"></div>
      <span class="kourel-hero-star">✦</span>
      <div class="kourel-hero-line"></div>
    </div>
    <h1 class="kourel-hero-title">{{ kourelName }}</h1>
    <p class="kourel-hero-sub">{{ pdfs().length }} khassidas — Cliquez sur un khassida pour le lire</p>
  </div>

  <!-- GRILLE PDFs -->
  <div class="kourel-grid">
    @for (pdf of pdfs(); track pdf.filename; let i = $index) {
      <div class="kourel-card" (click)="openPdf(pdf)">

        <div class="kourel-card-num">{{ i + 1 }}</div>

        <div class="kourel-card-icon">
          <svg viewBox="0 0 56 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8,2 L40,2 L54,16 L54,62 L8,62 Z" fill="currentColor" opacity="0.12"/>
            <path d="M8,2 L40,2 L54,16 L54,62 L8,62 Z" fill="none" stroke="currentColor" stroke-width="1" opacity="0.4"/>
            <path d="M40,2 L40,16 L54,16" fill="none" stroke="currentColor" stroke-width="1" opacity="0.4"/>
            <line x1="16" y1="28" x2="46" y2="28" stroke="currentColor" stroke-width="1" opacity="0.3"/>
            <line x1="16" y1="36" x2="46" y2="36" stroke="currentColor" stroke-width="1" opacity="0.3"/>
            <line x1="16" y1="44" x2="38" y2="44" stroke="currentColor" stroke-width="1" opacity="0.3"/>
            <text x="28" y="22" text-anchor="middle" font-family="serif" font-size="9" fill="currentColor" opacity="0.7">PDF</text>
          </svg>
        </div>

        <div class="kourel-card-info">
          <div class="kourel-card-name">{{ pdf.label }}</div>
          <div class="kourel-card-open">
            <svg width="11" height="11" viewBox="0 0 14 14" fill="currentColor"><path d="M5 2l5 5-5 5V2z"/></svg>
            Ouvrir
          </div>
        </div>

        <div class="kourel-card-glow"></div>
      </div>
    }
  </div>

</div>
